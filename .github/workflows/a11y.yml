name: Accessibility

on:
  pull_request:
  workflow_dispatch:

jobs:
  lighthouse-a11y:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse accessibility checks
        run: npm run a11y:check
